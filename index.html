<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tic Tac Toe 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #08080e;
  --surface:  #111118;
  --surface2: #181824;
  --border:   #222230;
  --border2:  #2e2e40;
  --x-color:  #e8ff6b;
  --o-color:  #ff6b9d;
  --text:     #f2f2f8;
  --muted:    #55556a;
  --muted2:   #8888a0;
  --radius:   18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--bg);min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;
  font-family:'Syne',sans-serif;color:var(--text);
  overflow-x:hidden;overflow-y:auto;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(232,255,107,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,255,107,0.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}
#lobbyScreen{
  width:100%;max-width:420px;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding:32px 16px 40px;
}
#gameScreen{
  width:100%;max-width:460px;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding:16px 16px 28px;gap:11px;
}
.hidden{display:none !important;}

/* Lobby */
.lobby-title{text-align:center;font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px;}
.lobby-sub{text-align:center;font-size:13px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:26px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:20px;margin-bottom:12px;width:100%;}
.card-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:12px;}
.input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color 0.2s;}
.inp:focus{border-color:var(--x-color);}
.inp::placeholder{color:var(--muted);}
.btn{padding:10px 18px;border:1px solid var(--border2);border-radius:12px;background:var(--surface2);color:var(--muted2);font-size:13px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn:hover{border-color:var(--muted);color:var(--text);}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.btn.primary{background:var(--x-color);border-color:var(--x-color);color:#0a0a0a;}
.btn.primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 22px rgba(232,255,107,0.3);}
.btn.full{width:100%;justify-content:center;display:flex;}
.btn.pink{background:var(--o-color);border-color:var(--o-color);color:#0a0a0a;}
.btn.pink:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 22px rgba(255,107,157,0.3);}
.btn.danger{border-color:#ff4466;color:#ff4466;}
.btn.danger:hover{background:#ff4466;color:#fff;}
.room-code-display{background:var(--bg);border:1px solid var(--border2);border-radius:12px;padding:14px;text-align:center;font-family:'DM Mono',monospace;font-size:26px;font-weight:700;letter-spacing:6px;color:var(--x-color);margin:10px 0;cursor:pointer;transition:background 0.2s;user-select:all;}
.room-code-display:hover{background:var(--surface2);}
.status-msg{text-align:center;font-size:13px;color:var(--muted2);font-family:'DM Mono',monospace;margin-top:8px;min-height:18px;}
.pulse{animation:pulseDot 1.2s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:0.3}}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;margin:4px 0;width:100%;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* Game header */
.game-header{display:flex;align-items:center;justify-content:space-between;width:100%;}
.game-title{font-size:13px;color:var(--muted2);font-family:'DM Mono',monospace;}
.room-tag{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;}
.online-dot{width:7px;height:7px;border-radius:50%;background:#44ff88;display:inline-block;animation:blink 2s ease-in-out infinite;}
.online-dot.offline{background:#ff4444;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

/* Scoreboard */
.scoreboard{display:flex;gap:10px;align-items:stretch;width:100%;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;text-align:center;flex:1;transition:border-color 0.25s,box-shadow 0.25s;position:relative;}
.score-card.active-x{border-color:var(--x-color);box-shadow:0 0 0 1px var(--x-color),0 8px 28px rgba(232,255,107,0.12);}
.score-card.active-o{border-color:var(--o-color);box-shadow:0 0 0 1px var(--o-color),0 8px 28px rgba(255,107,157,0.12);}
.you-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--x-color);color:#0a0a0a;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
.you-badge.o{background:var(--o-color);}
.score-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:3px;}
.score-label.x{color:var(--x-color);}
.score-label.o{color:var(--o-color);}
.score-name{font-size:11px;color:var(--muted2);margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-num{font-size:26px;font-weight:800;color:var(--text);line-height:1;font-family:'DM Mono',monospace;}
.score-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 2px;}
.score-divider span{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:600;font-family:'DM Mono',monospace;text-transform:uppercase;}
.draw-num{font-size:18px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;}

/* Status + turn timer */
.status-row{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;}
.status{font-size:13px;font-weight:600;color:var(--muted2);font-family:'DM Mono',monospace;letter-spacing:0.5px;text-align:center;}
.status .x-turn{color:var(--x-color);}
.status .o-turn{color:var(--o-color);}
.status .win{color:var(--text);font-weight:700;}
.status .draw{color:var(--muted2);}
.turn-timer-wrap{width:100%;height:4px;background:var(--border);border-radius:4px;overflow:hidden;opacity:0;transition:opacity 0.3s;}
.turn-timer-wrap.show{opacity:1;}
.turn-timer-bar{height:100%;border-radius:4px;background:var(--x-color);transition:width 1s linear,background 0.5s;width:100%;}
.turn-timer-bar.o-bar{background:var(--o-color);}
.turn-timer-bar.urgent{background:#ff4444 !important;animation:urgentPulse 0.5s ease-in-out infinite;}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:0.5}}
.turn-timer-label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

/* Board */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:26px;box-shadow:0 24px 64px rgba(0,0,0,0.5);width:100%;}
.cell{aspect-ratio:1;background:var(--bg);border:1px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,9vw,42px);font-weight:800;cursor:pointer;transition:background 0.15s,border-color 0.15s,transform 0.1s,opacity 0.2s;user-select:none;-webkit-tap-highlight-color:transparent;font-family:'DM Mono',monospace;}
.cell:hover:not(.taken):not(.disabled){background:var(--surface2);border-color:var(--border2);transform:scale(1.04);}
.cell:active:not(.taken):not(.disabled){transform:scale(0.96);}
.cell.taken,.cell.disabled{cursor:default;}
.cell.disabled:not(.taken){opacity:0.4;}
.cell .mark{animation:popIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;display:block;line-height:1;}
.cell.x-mark{color:var(--x-color);border-color:rgba(232,255,107,0.2);}
.cell.o-mark{color:var(--o-color);border-color:rgba(255,107,157,0.2);}
.cell.win-cell.x-mark{background:rgba(232,255,107,0.07);border-color:var(--x-color);animation:winPulse 0.5s ease both;}
.cell.win-cell.o-mark{background:rgba(255,107,157,0.07);border-color:var(--o-color);animation:winPulse 0.5s ease both;}
@keyframes popIn{from{transform:scale(0.4) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes winPulse{0%{transform:scale(1);}35%{transform:scale(1.09);}100%{transform:scale(1);}}

/* Actions */
.actions{display:flex;gap:8px;justify-content:center;width:100%;flex-wrap:wrap;}

/* Chat */
.chat-wrap{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;}
.chat-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;}
.chat-messages{height:140px;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-track{background:transparent;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.chat-msg{display:flex;flex-direction:column;gap:1px;max-width:82%;}
.chat-msg.mine{align-self:flex-end;align-items:flex-end;}
.chat-msg.theirs{align-self:flex-start;align-items:flex-start;}
.chat-msg.system{align-self:center;align-items:center;max-width:100%;}
.chat-bubble{padding:7px 11px;border-radius:14px;font-size:13px;font-weight:500;word-break:break-word;line-height:1.4;}
.chat-msg.mine .chat-bubble{background:rgba(232,255,107,0.12);color:var(--text);border-bottom-right-radius:4px;}
.chat-msg.theirs .chat-bubble{background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;}
.chat-msg.system .chat-bubble{background:transparent;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;}
.chat-sender{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;padding:0 4px;}
.reactions-bar{display:flex;gap:4px;padding:6px 12px;border-top:1px solid var(--border);overflow-x:auto;}
.reactions-bar::-webkit-scrollbar{display:none;}
.react-btn{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:16px;cursor:pointer;transition:transform 0.15s,background 0.15s;flex-shrink:0;}
.react-btn:hover{transform:scale(1.2);background:var(--surface2);}
.react-btn:active{transform:scale(0.9);}
.chat-input-row{display:flex;border-top:1px solid var(--border);}
.chat-inp{flex:1;background:transparent;border:none;outline:none;padding:10px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:500;}
.chat-inp::placeholder{color:var(--muted);}
.chat-send-btn{background:transparent;border:none;cursor:pointer;padding:10px 14px;color:var(--o-color);font-size:18px;transition:transform 0.15s;}
.chat-send-btn:hover{transform:scale(1.15);}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(8,8,14,0.88);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.show{opacity:1;pointer-events:auto;}
.overlay-card{background:var(--surface);border:1px solid var(--border2);border-radius:26px;padding:36px 44px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;gap:12px;max-width:320px;width:90%;}
.overlay-card.animate{animation:slideUp 0.38s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes slideUp{from{transform:translateY(32px) scale(0.95);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.overlay-emoji{font-size:56px;line-height:1;}
.overlay-title{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.5px;}
.overlay-sub{font-size:13px;color:var(--muted2);font-family:'DM Mono',monospace;}
.overlay-btns{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;}

/* Rematch timer */
.rematch-timer{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:6px;}
.rematch-ring{width:28px;height:28px;position:relative;}
.rematch-ring svg{transform:rotate(-90deg);}
.rematch-ring circle{fill:none;stroke-width:3;}
.rematch-ring .track{stroke:var(--border2);}
.rematch-ring .fill{stroke:var(--x-color);stroke-dasharray:75.4;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:12px 20px;font-size:13px;font-family:'DM Mono',monospace;color:var(--text);z-index:300;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Connecting */
.connecting{position:fixed;inset:0;background:rgba(8,8,14,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
.conn-spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--x-color);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.conn-text{font-family:'DM Mono',monospace;color:var(--muted2);font-size:13px;}

/* Typing indicator */
.typing-indicator{display:none;align-items:center;gap:6px;padding:2px 12px 6px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.typing-indicator.show{display:flex;}
.typing-dots{display:flex;gap:3px;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:typingBounce 1.2s ease-in-out infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-4px);opacity:1;}}

/* Reconnect banner */
.reconnect-banner{display:none;width:100%;background:rgba(255,68,102,0.12);border:1px solid rgba(255,68,102,0.3);border-radius:10px;padding:8px 14px;font-size:12px;font-family:'DM Mono',monospace;color:#ff6688;text-align:center;animation:fadeIn 0.3s ease;}
.reconnect-banner.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

/* Screen transitions */
#lobbyScreen, #gameScreen{transition:opacity 0.25s ease;}
#lobbyScreen.fading, #gameScreen.fading{opacity:0;pointer-events:none;}

/* Name input shake on empty */
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.inp.shake{animation:shake 0.35s ease;}
</style>
</head>
<body>

<div class="connecting hidden" id="connectingOverlay">
  <div class="conn-spinner"></div>
  <div class="conn-text">Connecting...</div>
</div>

<div class="toast" id="toast"></div>

<!-- LOBBY -->
<div id="lobbyScreen">
  <div class="lobby-title">Tic Tac Toe 💕</div>
  <div class="lobby-sub">Play with your special someone</div>

  <div class="card">
    <div class="card-title">Your Name</div>
    <input class="inp" id="playerName" maxlength="12" placeholder="Enter your name..." 
      onkeydown="if(event.key==='Enter') document.getElementById('playerName').blur()">
  </div>

  <div class="card">
    <div class="card-title">Create a Room</div>
    <button class="btn primary full" onclick="createRoom()">Create New Room</button>
    <div class="status-msg" id="createMsg"></div>
  </div>

  <div class="divider">or</div>

  <div class="card">
    <div class="card-title">Join a Room</div>
    <div class="input-row">
      <input class="inp" id="joinCode" maxlength="6" placeholder="Room code..." 
        style="text-transform:uppercase;letter-spacing:3px;font-family:'DM Mono',monospace;"
        onkeydown="if(event.key==='Enter') joinRoom()">
      <button class="btn pink" onclick="joinRoom()">Join</button>
    </div>
    <div class="status-msg" id="joinMsg"></div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="hidden">
  <div class="game-header">
    <div class="game-title">Tic Tac Toe 💕</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="muteBtn" onclick="toggleMute()" title="Toggle sound" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;opacity:0.7;transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">🔊</button>
      <span class="online-dot" id="oppDot" title="Opponent status"></span>
      <div class="room-tag" id="roomTag"></div>
    </div>
  </div>

  <div class="scoreboard">
    <div class="score-card" id="cardX">
      <div class="score-label x">X</div>
      <div class="score-name" id="nameXDisplay">-</div>
      <div class="score-num" id="scoreX">0</div>
    </div>
    <div class="score-divider">
      <div class="draw-num" id="scoreDraw">0</div>
      <span>Draw</span>
    </div>
    <div class="score-card" id="cardO">
      <div class="score-label o">O</div>
      <div class="score-name" id="nameODisplay">-</div>
      <div class="score-num" id="scoreO">0</div>
    </div>
  </div>

  <!-- Reconnect banner -->
  <div class="reconnect-banner" id="reconnectBanner">⚠️ Opponent disconnected — waiting for them to reconnect...</div>

  <div class="status-row">
    <div class="status" id="status"><span class="pulse">Waiting for opponent...</span></div>
    <div class="turn-timer-wrap" id="timerWrap">
      <div class="turn-timer-bar" id="timerBar"></div>
    </div>
    <div class="turn-timer-label" id="timerLabel"></div>
  </div>

  <div class="board" id="board">
    <div class="cell" data-i="0" role="button" aria-label="Row 1, Column 1"></div>
    <div class="cell" data-i="1" role="button" aria-label="Row 1, Column 2"></div>
    <div class="cell" data-i="2" role="button" aria-label="Row 1, Column 3"></div>
    <div class="cell" data-i="3" role="button" aria-label="Row 2, Column 1"></div>
    <div class="cell" data-i="4" role="button" aria-label="Row 2, Column 2"></div>
    <div class="cell" data-i="5" role="button" aria-label="Row 2, Column 3"></div>
    <div class="cell" data-i="6" role="button" aria-label="Row 3, Column 1"></div>
    <div class="cell" data-i="7" role="button" aria-label="Row 3, Column 2"></div>
    <div class="cell" data-i="8" role="button" aria-label="Row 3, Column 3"></div>
  </div>

  <div class="actions">
    <button class="btn danger" onclick="leaveGame()">← Leave</button>
    <button class="btn" onclick="copyRoomCode()">Copy Code</button>
    <button class="btn primary hidden" onclick="requestNewGame()" id="newGameBtn">Play Again</button>
  </div>

  <!-- Chat -->
  <div class="chat-wrap">
    <div class="chat-header">💬 <span>Chat</span></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="typing-indicator" id="typingIndicator">
      <span id="typingName">Opponent</span> is typing
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="reactions-bar">
      <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
      <button class="react-btn" onclick="sendReaction('😂')">😂</button>
      <button class="react-btn" onclick="sendReaction('😤')">😤</button>
      <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
      <button class="react-btn" onclick="sendReaction('👏')">👏</button>
      <button class="react-btn" onclick="sendReaction('😘')">😘</button>
      <button class="react-btn" onclick="sendReaction('🤭')">🤭</button>
      <button class="react-btn" onclick="sendReaction('💀')">💀</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-inp" id="chatInput" maxlength="120" placeholder="Type a message...">
      <button class="chat-send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-card" id="overlayCard">
    <div class="overlay-emoji" id="overlayEmoji">🏆</div>
    <div class="overlay-title" id="overlayTitle">You Win!</div>
    <div class="overlay-sub" id="overlaySub">Well played!</div>
    <div class="rematch-timer hidden" id="rematchTimerWrap">
      <div class="rematch-ring">
        <svg width="28" height="28" viewBox="0 0 28 28">
          <circle class="track" cx="14" cy="14" r="12"/>
          <circle class="fill" id="rematchRing" cx="14" cy="14" r="12"/>
        </svg>
      </div>
      <span id="rematchTimerLabel">60s</span>
    </div>
    <div class="overlay-btns">
      <button class="btn primary" onclick="requestNewGame()">Play Again</button>
      <button class="btn" onclick="closeOverlay()">Close</button>
    </div>
  </div>
</div>

<script type="module">
/*
  FIXES APPLIED (v2):
  1. checkWin — fixed variable shadowing bug (was [a,c,d] should be [a,b,c])
  2. Room code collision — now retries up to 5x to find a unique code
  3. leaveGame — sets status:'closed' before deleting so opponent gets notified
  4. leaveGame — cancels onDisconnect hooks on clean exit
  5. requestNewGame — loser starts next round; draws alternate starter fairly
  6. autoSkipTurn — server-side elapsed time check prevents double-skip
  7. Chat — incremental append (no full re-render), capped at 100 msgs
  8. Chat — rate limited to 1 msg per 800ms
  9. Rematch timer — synced to server gameOverAt timestamp (both clients agree)
  10. Sound — mute toggle button added
  11. Accessibility — aria-labels on board cells
  12. Room expiry — createdAt timestamp stored for future cleanup
*/
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, off, onDisconnect, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase ───────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyA1D4WrsF4LIR9qIgmaJJRLEjJL3kNCNqY",
  authDomain: "anushka-a6a86.firebaseapp.com",
  databaseURL: "https://anushka-a6a86-default-rtdb.firebaseio.com",
  projectId: "anushka-a6a86",
  storageBucket: "anushka-a6a86.firebasestorage.app",
  messagingSenderId: "323961312756",
  appId: "1:323961312756:web:8f845646bcaa53ff1195a1"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Constants ──────────────────────────────────────────────
const WINS         = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const TURN_LIMIT   = 120;  // 2 min
const REMATCH_LIMIT= 60;   // 1 min

// ── State ──────────────────────────────────────────────────
let roomId       = null;
let myRole       = null;
let myName       = '';
// Unique session ID per browser tab — prevents same device joining own room
let mySessionId  = Math.random().toString(36).slice(2) + Date.now().toString(36);
let gameListener = null;
let chatListener = null;
let processing   = false;
let overlayShown = false;
let lastStatus   = null;

let turnTimerInterval = null;
let rematchInterval   = null;
let lastChatCount     = 0;
let typingTimeout     = null;
let lastBoardState    = null;

// ── DOM ────────────────────────────────────────────────────
const cells   = document.querySelectorAll('.cell');
const statusEl= document.getElementById('status');
const overlay = document.getElementById('overlay');
const lobbyEl = document.getElementById('lobbyScreen');
const gameEl  = document.getElementById('gameScreen');

cells.forEach(cell =>
  cell.addEventListener('click', () => handleCellClick(+cell.dataset.i))
);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendChat(); return; }
  // Typing indicator — write to Firebase that we're typing
  if (roomId && myRole) {
    update(ref(db, `rooms/${roomId}/typing`), { [myRole]: true }).catch(()=>{});
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      if (roomId && myRole) update(ref(db, `rooms/${roomId}/typing`), { [myRole]: false }).catch(()=>{});
    }, 1500);
  }
});

// ── Utils ──────────────────────────────────────────────────
function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

function showToast(msg, dur=3200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function checkWin(board) {
  return WINS.find(([a,b,c]) => board[a] && board[a]===board[b] && board[b]===board[c]) || null;
}

// ── Copy code — works on all Android browsers ──────────────
window.copyRoomCode = function() {
  if (!roomId) return;
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(roomId)
      .then(() => showToast('✅ Code copied!'))
      .catch(() => fallbackCopy(roomId));
  } else { fallbackCopy(roomId); }
};
window.copyCode = window.copyRoomCode;

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast('✅ Code copied!'); }
  catch(e) { showToast('Code: ' + text, 6000); }
  document.body.removeChild(ta);
}

// ── Create Room ────────────────────────────────────────────
window.createRoom = async function() {
  const nameInp = document.getElementById('playerName');
  const createBtn = document.querySelector('[onclick="createRoom()"]');
  if (createBtn) createBtn.disabled = true; // prevent double-tap
  myName = nameInp.value.trim();
  if (!myName) {
    nameInp.classList.remove('shake');
    void nameInp.offsetWidth;
    nameInp.classList.add('shake');
    nameInp.focus();
    myName = 'Player ' + Math.floor(Math.random()*900+100);
  }
  const msg = document.getElementById('createMsg');
  msg.innerHTML = `<span class="pulse">Creating room...</span>`;

  // FIX: Check for room code collision — retry until unique
  let code;
  for (let attempt = 0; attempt < 5; attempt++) {
    const candidate = genCode();
    try {
      const snap = await get(ref(db, `rooms/${candidate}`));
      if (!snap.exists()) { code = candidate; break; }
    } catch(e) {}
  }
  if (!code) { msg.textContent = '❌ Could not create room. Try again.'; return; }

  roomId = code; myRole = 'X';

  await set(ref(db, `rooms/${code}`), {
    players:  { X: myName, O: null },
    sessions: { X: mySessionId, O: null },
    board:    Array(9).fill(null),
    current:  'X', status: 'waiting',
    scores:   { X:0, O:0, D:0 },
    winner: null, newGameRequest: null, turnStart: null,
    createdAt: Date.now(),
    presence: { X: true, O: false }
  });

  // Auto-remove X presence on disconnect
  onDisconnect(ref(db, `rooms/${code}/presence/X`)).set(false);

  msg.innerHTML = `
    Room created! Share this code:
    <div class="room-code-display" onclick="copyCode()" title="Tap to copy">${code}</div>
    <small style="color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;">tap to copy • share with your partner 💕</small>
  `;
  listenToRoom(code);
};

// ── Join Room ──────────────────────────────────────────────
window.joinRoom = async function() {
  const joinBtn = document.querySelector('[onclick="joinRoom()"]');
  if (joinBtn) joinBtn.disabled = true;
  const nameInp = document.getElementById('playerName');
  myName = nameInp.value.trim() || 'Player ' + Math.floor(Math.random()*900+100);
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  const msg  = document.getElementById('joinMsg');

  if (code.length !== 6) {
    msg.textContent = 'Enter a 6-character code.';
    if (joinBtn) joinBtn.disabled = false;
    return;
  }
  msg.innerHTML = `<span class="pulse">Joining...</span>`;

  let snap;
  try { snap = await get(ref(db, `rooms/${code}`)); }
  catch(e) { msg.textContent = '❌ Connection error. Try again.'; if (joinBtn) joinBtn.disabled = false; return; }

  if (!snap.exists()) { msg.textContent = '❌ Room not found.'; if (joinBtn) joinBtn.disabled = false; return; }
  const data = snap.val();
  if (data.players?.O) { msg.textContent = '❌ Room is full.'; if (joinBtn) joinBtn.disabled = false; return; }

  if (data.sessions?.X === mySessionId) {
    msg.textContent = '❌ You cannot join your own room!';
    if (joinBtn) joinBtn.disabled = false;
    return;
  }

  roomId = code; myRole = 'O';

  await update(ref(db, `rooms/${code}/players`),  { O: myName });
  await update(ref(db, `rooms/${code}/sessions`), { O: mySessionId });
  await update(ref(db, `rooms/${code}/presence`), { O: true });
  await update(ref(db, `rooms/${code}`), { status: 'playing', turnStart: Date.now() });

  onDisconnect(ref(db, `rooms/${code}/presence/O`)).set(false);
  listenToRoom(code);
};

// ── Listen ─────────────────────────────────────────────────
function listenToRoom(code) {
  // ✅ FIX: Properly detach old listeners before attaching new ones
  if (gameListener) { off(ref(db, `rooms/${code}`), 'value', gameListener); gameListener = null; }
  if (chatListener) { off(ref(db, `rooms/${code}/chat`), 'value', chatListener); chatListener = null; }

  gameListener = onValue(ref(db, `rooms/${code}`), snap => {
    if (!snap.exists()) { showToast('⚠️ Room was closed.'); leaveGame(); return; }
    const d = snap.val();
    if (d.status === 'closed') { showToast('👋 Host left the game.'); leaveGame(); return; }
    renderGame(d);
  });

  chatListener = onValue(ref(db, `rooms/${code}/chat`), snap => {
    if (snap.exists()) renderChat(snap.val());
  });
}

// ── Render Game ────────────────────────────────────────────
function renderGame(data) {
  const { players, board, current, status, scores, newGameRequest, presence, winner, typing } = data;

  // Smooth transition: lobby → game (only if lobby is visible and O just joined)
  const lobbyVisible = !lobbyEl.classList.contains('hidden');
  if (lobbyVisible && players.O) {
    lobbyEl.classList.add('fading');
    setTimeout(() => {
      lobbyEl.classList.add('hidden');
      lobbyEl.classList.remove('fading');
      gameEl.classList.remove('hidden');
      overlayShown = false;
    }, 220);
    return; // wait for transition, next Firebase event will re-render
  }
  if (!players.O) return;

  // Opponent presence dot + reconnect banner
  const oppRole = myRole === 'X' ? 'O' : 'X';
  const oppOnline = !!presence?.[oppRole];
  const dot = document.getElementById('oppDot');
  dot.className = 'online-dot' + (oppOnline ? '' : ' offline');
  dot.title = oppOnline ? 'Opponent online' : 'Opponent disconnected';
  const banner = document.getElementById('reconnectBanner');
  if (!oppOnline && status === 'playing') banner.classList.add('show');
  else banner.classList.remove('show');

  // Typing indicator
  const oppTyping = !!typing?.[oppRole];
  const typingEl = document.getElementById('typingIndicator');
  const typingNameEl = document.getElementById('typingName');
  typingNameEl.textContent = players[oppRole] || 'Opponent';
  if (oppTyping) typingEl.classList.add('show');
  else typingEl.classList.remove('show');

  // Names
  document.getElementById('nameXDisplay').textContent = players.X || 'Player 1';
  document.getElementById('nameODisplay').textContent = players.O || 'Player 2';
  document.getElementById('roomTag').textContent = `# ${roomId}`;

  // Scores
  document.getElementById('scoreX').textContent    = scores?.X || 0;
  document.getElementById('scoreO').textContent    = scores?.O || 0;
  document.getElementById('scoreDraw').textContent = scores?.D || 0;

  // Score cards + YOU badge (fully rebuilt each time to avoid duplicates)
  ['cardX','cardO'].forEach(id => {
    const card = document.getElementById(id);
    const role = id==='cardX' ? 'X' : 'O';
    card.querySelector('.you-badge')?.remove();
    card.className = 'score-card' + (current===role ? (role==='X'?' active-x':' active-o') : '');
    if (role === myRole) {
      const b = document.createElement('div');
      b.className = 'you-badge' + (role==='O'?' o':'');
      b.textContent = 'YOU';
      card.appendChild(b);
    }
  });

  // Board — only re-render if board actually changed (avoids popIn re-triggering on chat/presence updates)
  const boardKey = board.join(',');
  if (boardKey !== lastBoardState) {
    lastBoardState = boardKey;
    cells.forEach((cell, i) => {
      const val = board[i];
      cell.innerHTML = val ? `<span class="mark">${val}</span>` : '';
      cell.className = 'cell';
      if (val) cell.classList.add('taken', val==='X'?'x-mark':'o-mark');
    });
  }
  // Always update disabled state (turn can change without board changing)
  cells.forEach((cell, i) => {
    const val = board[i];
    cell.classList.remove('disabled', 'win-cell');
    const myTurn = current===myRole && status==='playing';
    if (!myTurn || val || status!=='playing') cell.classList.add('disabled');
  });

  // Win highlight — always re-apply after disabled state pass
  const winCombo = checkWin(board);
  if (winCombo) winCombo.forEach(i => cells[i].classList.add('win-cell'));

  // Status & game state
  const newGameBtn = document.getElementById('newGameBtn');

  if (status === 'playing') {
    newGameBtn.classList.add('hidden');
    newGameBtn.disabled = true;
    // Only hide overlay if game genuinely restarted (was won/draw before)
    if (overlayShown && lastStatus !== 'playing') {
      overlay.classList.remove('show');
      overlayShown = false;
    }
    statusEl.innerHTML = current===myRole
      ? `<span class="${myRole==='X'?'x-turn':'o-turn'}">Your turn!</span>`
      : `<span class="${current==='X'?'x-turn':'o-turn'}">${myRole==='X'?(players.O||'Opp'):(players.X||'Opp')}'s turn...</span>`;
    startTurnTimer(data.turnStart, current);

  } else if (status === 'won') {
    stopTurnTimer();
    newGameBtn.classList.remove('hidden');
    newGameBtn.disabled = false;
    const wName = winner==='X' ? players.X : players.O;
    statusEl.innerHTML = `<span class="win">${wName} wins! 🎉</span>`;
    // ✅ FIX: overlayShown prevents re-triggering on every Firebase sync
    if (!overlayShown) {
      overlayShown = true;
      showGameOverlay(winner===myRole?'you_win':'you_lose', wName);
      playSound(winner===myRole?'win':'lose');
      startRematchTimer(data.gameOverAt);
    }

  } else if (status === 'draw') {
    stopTurnTimer();
    newGameBtn.classList.remove('hidden');
    newGameBtn.disabled = false;
    statusEl.innerHTML = `<span class="draw">It's a draw!</span>`;
    if (!overlayShown) {
      overlayShown = true;
      showGameOverlay('draw', null);
      playSound('draw');
      startRematchTimer(data.gameOverAt);
    }

  } else if (status === 'waiting') {
    stopTurnTimer();
    newGameBtn.classList.add('hidden');
    statusEl.innerHTML = `<span class="pulse">Waiting for opponent to join...</span>`;
  }

  if (newGameRequest && newGameRequest !== myRole && status !== 'playing') {
    document.getElementById('overlaySub').textContent = '⏳ Opponent wants to replay!';
  }

  lastStatus = status;
}

// ── Turn Timer ─────────────────────────────────────────────
function startTurnTimer(turnStart, currentPlayer) {
  stopTurnTimer();
  if (!turnStart) return;
  const wrap  = document.getElementById('timerWrap');
  const bar   = document.getElementById('timerBar');
  const label = document.getElementById('timerLabel');
  wrap.classList.add('show');
  bar.className = 'turn-timer-bar' + (currentPlayer==='O'?' o-bar':'');

  function tick() {
    const elapsed = Math.floor((Date.now() - turnStart) / 1000);
    const left = Math.max(0, TURN_LIMIT - elapsed);
    bar.style.width = (left / TURN_LIMIT * 100) + '%';
    label.textContent = left + 's';
    if (left <= 20) bar.classList.add('urgent');
    else bar.classList.remove('urgent');
    if (left <= 0) { stopTurnTimer(); if (currentPlayer===myRole) autoSkipTurn(); }
  }
  tick();
  turnTimerInterval = setInterval(tick, 1000);
}

function stopTurnTimer() {
  clearInterval(turnTimerInterval); turnTimerInterval = null;
  document.getElementById('timerWrap').classList.remove('show');
  document.getElementById('timerLabel').textContent = '';
}

async function autoSkipTurn() {
  if (!roomId || processing) return;
  processing = true;
  try {
    const snap = await get(ref(db, `rooms/${roomId}`));
    if (!snap.exists()) return;
    const d = snap.val();
    // FIX: Double-guard — verify it's still our turn AND timer actually expired server-side
    if (d.status !== 'playing' || d.current !== myRole) return;
    const elapsed = Math.floor((Date.now() - d.turnStart) / 1000);
    if (elapsed < TURN_LIMIT - 2) return; // Not actually expired (clock skew buffer)
    showToast("⏰ Time's up! Turn skipped.");
    await update(ref(db, `rooms/${roomId}`), {
      current: myRole==='X'?'O':'X',
      turnStart: Date.now()
    });
  } finally {
    processing = false;
  }
}

// ── Rematch Timer ──────────────────────────────────────────
// FIX: Use the gameOver timestamp from server so both clients are in sync
function startRematchTimer(gameOverTs) {
  stopRematchTimer();
  const wrap = document.getElementById('rematchTimerWrap');
  const lbl  = document.getElementById('rematchTimerLabel');
  const ring = document.getElementById('rematchRing');
  const circ = 2 * Math.PI * 12;
  wrap.classList.remove('hidden');

  function tick() {
    const elapsed = Math.floor((Date.now() - (gameOverTs || Date.now())) / 1000);
    const left = Math.max(0, REMATCH_LIMIT - elapsed);
    lbl.textContent = left + 's';
    ring.style.strokeDashoffset = circ * (1 - left / REMATCH_LIMIT);
    if (left <= 0) {
      stopRematchTimer();
      overlay.classList.remove('show');
      showToast('⏰ Rematch expired. Room closed.');
      setTimeout(() => leaveGame(), 1800);
      return;
    }
  }
  tick();
  rematchInterval = setInterval(tick, 1000);
}

function stopRematchTimer() {
  clearInterval(rematchInterval); rematchInterval = null;
  document.getElementById('rematchTimerWrap')?.classList.add('hidden');
}

// ── Cell Click ─────────────────────────────────────────────
async function handleCellClick(i) {
  if (!roomId || processing) return;
  processing = true; // ✅ FIX: Lock to prevent race conditions
  try {
    const snap = await get(ref(db, `rooms/${roomId}`));
    if (!snap.exists()) return;
    const data = snap.val();
    if (data.status!=='playing' || data.current!==myRole || data.board[i]) return;

    const nb = [...data.board]; nb[i] = myRole;
    playSound('place');
    const win    = checkWin(nb);
    const isDraw = !win && nb.every(c => c);
    const upd    = { board: nb };

    if (win) {
      const ns = {...data.scores}; ns[myRole] = (ns[myRole]||0)+1;
      upd.status='won'; upd.winner=myRole; upd.scores=ns; upd.turnStart=null; upd.gameOverAt=Date.now();
    } else if (isDraw) {
      const ns = {...data.scores}; ns.D = (ns.D||0)+1;
      upd.status='draw'; upd.scores=ns; upd.turnStart=null; upd.gameOverAt=Date.now();
    } else {
      upd.current   = myRole==='X'?'O':'X';
      upd.turnStart = Date.now();
    }
    await update(ref(db, `rooms/${roomId}`), upd);
  } finally {
    processing = false; // ✅ Always unlock
  }
}

// ── Request New Game ───────────────────────────────────────
window.requestNewGame = async function() {
  if (!roomId) return;
  stopRematchTimer();
  const snap = await get(ref(db, `rooms/${roomId}`));
  if (!snap.exists()) return;
  const data = snap.val();

  if (data.newGameRequest && data.newGameRequest !== myRole) {
    // FIX: Loser starts next round; on draw, alternate from last starter
    let next;
    if (data.winner) {
      next = data.winner === 'X' ? 'O' : 'X'; // loser goes first
    } else {
      // draw — alternate: whoever started last time, other goes first
      next = data.lastStarter === 'X' ? 'O' : 'X';
    }
    await update(ref(db, `rooms/${roomId}`), {
      board: Array(9).fill(null), current: next,
      status: 'playing', winner: null,
      newGameRequest: null, turnStart: Date.now(),
      lastStarter: next
    });
    overlay.classList.remove('show');
    overlayShown = false;
  } else {
    await update(ref(db, `rooms/${roomId}`), { newGameRequest: myRole });
    document.getElementById('overlaySub').textContent = '⏳ Waiting for opponent...';
  }
};

window.closeOverlay = () => overlay.classList.remove('show');

// ── Leave Game ─────────────────────────────────────────────
window.leaveGame = async function() {
  stopTurnTimer(); stopRematchTimer();
  clearTimeout(typingTimeout);
  overlayShown = false; lastStatus = null; lastChatCount = 0;

  if (roomId) {
    if (gameListener) { off(ref(db,`rooms/${roomId}`),'value',gameListener); gameListener=null; }
    if (chatListener) { off(ref(db,`rooms/${roomId}/chat`),'value',chatListener); chatListener=null; }

    // FIX: Cancel pending onDisconnect hooks so they don't fire after a clean leave
    try { onDisconnect(ref(db, `rooms/${roomId}/presence/${myRole}`)).cancel(); } catch(e){}

    try {
      if (myRole==='X') {
        // FIX: Notify opponent before deleting — set status to 'closed' first, then delete after short delay
        await update(ref(db, `rooms/${roomId}`), { status: 'closed' });
        setTimeout(async () => {
          try { await remove(ref(db, `rooms/${roomId}`)); } catch(e){}
        }, 1500);
      } else {
        await update(ref(db,`rooms/${roomId}/players`), {O:null});
        await update(ref(db,`rooms/${roomId}/presence`), {O:false});
        await update(ref(db,`rooms/${roomId}`), {status:'waiting'});
      }
    } catch(e){}
  }

  roomId=null; myRole=null; processing=false; lastBoardState=null;
  overlay.classList.remove('show');
  gameEl.classList.add('hidden');
  lobbyEl.classList.remove('hidden');
  document.getElementById('createMsg').textContent='';
  document.getElementById('joinMsg').textContent='';
  document.getElementById('joinCode').value='';
  document.getElementById('chatMessages').innerHTML='';
};

// ── Chat ───────────────────────────────────────────────────
let lastChatSent = 0;
window.sendChat = async function() {
  if (!roomId || !myRole) return;
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim(); if (!txt) return;

  // FIX: Rate limit — 1 message per 800ms
  const now = Date.now();
  if (now - lastChatSent < 800) { showToast('⏳ Slow down!', 1500); return; }
  lastChatSent = now;
  clearTimeout(typingTimeout);
  if (roomId && myRole) update(ref(db, `rooms/${roomId}/typing`), { [myRole]: false }).catch(()=>{});

  inp.value = '';
  await push(ref(db, `rooms/${roomId}/chat`), {
    sender:myRole, name:myName, text:txt, ts:Date.now()
  });
};

window.sendReaction = async function(emoji) {
  if (!roomId || !myRole) return;
  await push(ref(db, `rooms/${roomId}/chat`), {
    sender:myRole, name:myName, text:emoji, ts:Date.now(), reaction:true
  });
  playSound('react');
};

function renderChat(chatData) {
  const container = document.getElementById('chatMessages');
  const msgs = Object.values(chatData).sort((a,b) => a.ts - b.ts);
  if (msgs.length === lastChatCount) return;

  const isScrolledToBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 40;

  // FIX: Incremental append — only add new messages, don't wipe the whole list
  const newMsgs = msgs.slice(lastChatCount);
  newMsgs.forEach(m => {
    const isMe = m.sender === myRole;
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (isMe?'mine':'theirs');
    if (!isMe) {
      const s = document.createElement('div');
      s.className='chat-sender'; s.textContent = m.name||(m.sender==='X'?'Player 1':'Player 2');
      div.appendChild(s);
    }
    const bubble = document.createElement('div');
    bubble.className='chat-bubble';
    // FIX: textContent already safe from XSS — keep it
    bubble.textContent = m.text;
    div.appendChild(bubble);
    container.appendChild(div);

    // FIX: Limit chat DOM to last 100 messages to prevent lag
    while (container.children.length > 100) container.removeChild(container.firstChild);
  });

  if (newMsgs.length > 0 && lastChatCount > 0) {
    const latest = newMsgs[newMsgs.length-1];
    if (latest.sender !== myRole) playSound('chat');
  }
  lastChatCount = msgs.length;
  if (isScrolledToBottom) container.scrollTop = container.scrollHeight;
}

// ── Overlay ────────────────────────────────────────────────
function showGameOverlay(type, winnerName) {
  const e=document.getElementById('overlayEmoji'),
        t=document.getElementById('overlayTitle'),
        s=document.getElementById('overlaySub');
  if(type==='you_win')  {e.textContent='🏆';t.textContent='You Win!';s.textContent='Well played! 🎉';}
  else if(type==='you_lose'){e.textContent='😅';t.textContent=`${winnerName} Wins!`;s.textContent='Better luck next time!';}
  else                   {e.textContent='🤝';t.textContent="It's a Draw!";s.textContent='Evenly matched 💕';}
  const card=document.getElementById('overlayCard');
  card.classList.remove('animate'); void card.offsetWidth; card.classList.add('animate');
  if(!overlay.classList.contains('show')) overlay.classList.add('show');
}

// ── Sound ──────────────────────────────────────────────────
let muted = false;
window.toggleMute = function() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
};

const AC = window.AudioContext||window.webkitAudioContext; let actx;
function ga(){if(!actx)actx=new AC();return actx;}
function playSound(t){
  if (muted) return;
  try{
    const c=ga(),g=c.createGain();g.connect(c.destination);
    if(t==='place'){
      const o=c.createOscillator();o.connect(g);o.type='sine';
      o.frequency.setValueAtTime(520,c.currentTime);o.frequency.exponentialRampToValueAtTime(420,c.currentTime+0.08);
      g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
      o.start();o.stop(c.currentTime+0.12);
    }else if(t==='win'){
      [0,0.12,0.26].forEach((d,i)=>{
        const o=c.createOscillator();o.connect(g);o.type='triangle';
        o.frequency.setValueAtTime([440,554,660][i],c.currentTime+d);
        g.gain.setValueAtTime(0.15,c.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+0.22);
        o.start(c.currentTime+d);o.stop(c.currentTime+d+0.22);
      });
    }else if(t==='lose'){
      const o=c.createOscillator();o.connect(g);o.type='sawtooth';
      o.frequency.setValueAtTime(280,c.currentTime);o.frequency.linearRampToValueAtTime(160,c.currentTime+0.3);
      g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
      o.start();o.stop(c.currentTime+0.35);
    }else if(t==='draw'){
      const o=c.createOscillator();o.connect(g);o.type='sine';
      o.frequency.setValueAtTime(300,c.currentTime);o.frequency.linearRampToValueAtTime(240,c.currentTime+0.25);
      g.gain.setValueAtTime(0.1,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
      o.start();o.stop(c.currentTime+0.3);
    }else if(t==='chat'){
      const o=c.createOscillator();o.connect(g);o.type='sine';
      o.frequency.setValueAtTime(660,c.currentTime);o.frequency.exponentialRampToValueAtTime(880,c.currentTime+0.06);
      g.gain.setValueAtTime(0.07,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
      o.start();o.stop(c.currentTime+0.1);
    }else if(t==='react'){
      [0,0.07].forEach((d,i)=>{
        const o=c.createOscillator();o.connect(g);o.type='sine';
        o.frequency.setValueAtTime([800,1000][i],c.currentTime+d);
        g.gain.setValueAtTime(0.09,c.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d+0.08);
        o.start(c.currentTime+d);o.stop(c.currentTime+d+0.08);
      });
    }
  }catch(e){}
}
</script>
